name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: ${{ matrix.os }} / Python ${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.10", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Run unit tests
        run: python -m unittest discover -s tests

      - name: Compile router
        run: python -m py_compile task-skill-router.py

      - name: Check shell installers
        if: runner.os != 'Windows'
        run: |
          bash -n install.sh
          bash -n install-macos.sh
          bash -n install-linux.sh

      - name: Check PowerShell installers
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $paths = @("install.ps1", "install-windows.ps1")
          foreach ($path in $paths) {
            $errors = $null
            [System.Management.Automation.Language.Parser]::ParseFile($path, [ref]$null, [ref]$errors) > $null
            if ($errors) {
              throw "PowerShell parse errors in ${path}: $($errors | Out-String)"
            }
          }
