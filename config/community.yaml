# task-skill-router community skill mapping
# ────────────────────────────────────────────────
# This file maps common task descriptions to skill names
# so that the recommender can find skills that don't
# have a clear SKILL.md description match.
#
# How to contribute:
# 1. Fork the repo
# 2. Add your mapping below under `skills:`
# 3. Submit a PR
#
# Schema per entry:
#   <skill_name>:
#     description: "What this skill does (1-2 sentences)"
#     tags: ["related", "keywords"]
#     command: "optional CLI command for auto-run"
#     install: "optional install hint shown when the skill is not installed"
#     mode: "auto-load" | "auto-run" | "recommend"

skills:
  # ── Dev / workflow ──────────────────────
  writing-plans:
    description: "Break down a task into structured plans, milestones, or task lists"
    tags: ["plan", "planning", "task breakdown", "milestone", "epic"]

  subagent-driven-development:
    description: "Execute plans via parallel sub-tasks with delegated agents"
    tags: ["subtask", "parallel", "worker", "delegate", "orchestrate"]

  brainstorming:
